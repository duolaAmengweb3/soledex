name: Soledex
options:
  bundleIdPrefix: com.duolaameng
  deploymentTarget:
    iOS: "17.0"
targets:
  Soledex:
    type: application
    platform: iOS
    sources:
      - Resources/Soledex.storekit
      - Resources/PrivacyInfo.xcprivacy
      - Sources
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.duolaameng.soledex
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      storeKitConfiguration: Resources/Soledex.storekit
    info:
      path: Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIUserInterfaceStyle: Light
        NSCameraUsageDescription: "Soledex uses the camera to identify your sneakers and look up their value."
        NSPhotoLibraryUsageDescription: "Add photos of your sneakers from your library to identify and value them."
